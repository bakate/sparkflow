app = "sparkflow-keycloak"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  KC_HOSTNAME = "https://sparkflow-keycloak.fly.dev"
  KC_HTTP_ENABLED = "true"
  KC_HTTP_HOST = "0.0.0.0"
  KC_PROXY_HEADERS = "xforwarded"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1024mb"
