@if (saving()) {
  <div class="flex flex-column gap-3" aria-busy="true" aria-live="polite">
    <div class="flex flex-column gap-2">
      <p-skeleton width="4rem" height="1.25rem" />
      <p-skeleton width="100%" height="2.5rem" />
    </div>

    <div class="flex flex-column gap-2">
      <p-skeleton width="6rem" height="1.25rem" />
      <p-skeleton width="100%" height="7rem" />
    </div>

    <div class="flex justify-content-end gap-2 pt-2">
      <p-skeleton width="5rem" height="2.25rem" />
      <p-skeleton width="6rem" height="2.25rem" />
    </div>
  </div>
} @else {
  <form (submit)="submitChallenge($event)" class="flex flex-column gap-3">
    @if (errorMessage() !== null) {
      <p class="form-alert" role="alert">
        <i class="pi pi-exclamation-triangle" aria-hidden="true"></i>
        <span>{{ errorMessage() }}</span>
      </p>
    }

    <div class="flex flex-column gap-2">
      <label for="challenge-title" class="font-bold text-color">Title</label>
      <input
        id="challenge-title"
        pInputText
        type="text"
        autocomplete="off"
        class="w-full"
        [formField]="challengeForm.title"
        [attr.aria-describedby]="shouldShowTitleError() ? 'challenge-title-error' : null"
      />
      @if (shouldShowTitleError()) {
        <p id="challenge-title-error" class="field-error" role="alert">
          <i class="pi pi-exclamation-circle" aria-hidden="true"></i>
          <span>{{ titleErrorMessage() }}</span>
        </p>
      }
    </div>

    <div class="flex flex-column gap-2">
      <label for="challenge-description" class="font-bold text-color">Description</label>
      <textarea
        id="challenge-description"
        rows="4"
        class="p-inputtext p-component w-full"
        [formField]="challengeForm.description"
        [attr.aria-describedby]="
          shouldShowDescriptionError() ? 'challenge-description-error' : null
        "
      ></textarea>

      @if (shouldShowDescriptionError()) {
        <p id="challenge-description-error" class="field-error" role="alert">
          <i class="pi pi-exclamation-circle" aria-hidden="true"></i>
          <span>{{ descriptionErrorMessage() }}</span>
        </p>
      }
    </div>

    <div class="flex justify-content-end gap-2 pt-2">
      <p-button label="Cancel" severity="secondary" type="button" (onClick)="onCancelForm()" />
      <p-button icon="pi pi-plus" [label]="submitLabel()" type="submit" />
    </div>
  </form>
}
