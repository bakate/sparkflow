app = "sparkflow-api-gateway"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  IDENTITY_SERVICE_URL = "http://sparkflow-identity-service.internal:4000"
  CHALLENGE_SERVICE_URL = "http://sparkflow-challenge-service.internal:4001"
  SUBMISSION_SERVICE_URL = "http://sparkflow-submission-service.internal:4002"
  NOTIFICATION_SERVICE_URL = "http://sparkflow-notification-service.internal:4003"
  EVALUATION_SERVICE_URL = "http://sparkflow-evaluation-service.internal:4004"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "256mb"
